services:
  mainweb-backend:
    image: maitreya16/mainweb-backend:latest
    container_name: mainweb-backend
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      EVENT_ID: ${EVENT_ID}
      OTP_EXPIRATION: ${OTP_EXPIRATION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
