<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&display=swap" rel="stylesheet">
  <style type="text/css">
    @media only screen and (max-width: 480px) {
      .mobile-padding {
        padding: 10px !important;
      }

      .card-padding {
        padding: 20px !important;
      }

      .header-title {
        font-size: 32px !important;
      }

      .content-text {
        font-size: 14px !important;
      }
    }
  </style>
</head>

<body
  style="margin:0; padding:0; background-color:#0a0a1a; font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased;">

  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" class="mobile-padding" style="padding:40px 10px;">

        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:400px;
               background: linear-gradient(135deg, #0f1729 0%, #1a0a2e 100%);
               border-radius:16px;
               border:2px solid #00d9ff;
               box-shadow: 0 0 40px rgba(0, 217, 255, 0.3);
               overflow:hidden;">

          <!-- Header -->
          <tr>
            <td align="center" style="background: linear-gradient(90deg, #0a1628 0%, #1a0f2e 100%); padding: 12px;">
              <span style="color:#00d9ff; font-size:11px; font-weight:bold; letter-spacing:1px; opacity:0.9;">
                CREDENZ'26
              </span>
            </td>
          </tr>

          <tr>
            <td class="card-padding" style="padding:30px;">
              <table width="100%" cellpadding="0" cellspacing="0">

                <!-- Logo + Title -->
                <tr>
                  <td align="center">
                    <div style="
                      display:inline-block;
                      padding:18px;
                      border-radius:50%;
                      background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, rgba(0,217,255,0.45) 30%, rgba(0,217,255,0.25) 45%, rgba(0,217,255,0) 65%);
                      box-shadow: 0 0 18px rgba(0,217,255,0.6), 0 0 36px rgba(0,217,255,0.4);
                      margin-bottom:15px;">
                      <a href="{{websiteurl}}"><img src="{{logourl}}" width="64" alt="Credenz Logo"
                          style="display:block;" />
                      </a>
                    </div>

                    <div class="header-title"
                      style="font-family: 'Merriweather', serif; font-size:36px; font-weight:900; color:#00d9ff; text-shadow:0 0 20px rgba(0,217,255,0.5); letter-spacing:1px; line-height:1; margin-bottom:20px;">
                      CREDENZ'26
                    </div>

                    <div
                      style="height: 2px; width: 100%; background: linear-gradient(90deg, transparent, #00d9ff, transparent); opacity: 0.5; margin-bottom: 20px;">
                    </div>
                  </td>
                </tr>

                <!-- Dynamic Content -->
                <tr>
                  <td style="color:#e0e0e0; font-size:14px; line-height:1.6;" class="content-text">
                    <h2 style="margin-top:0; font-size:18px;">Hello {{username}},</h2>
                    <div>
                      {{{content}}} <!-- Dynamic HTML content goes here -->
                    </div>
                  </td>
                </tr>


                <!-- Footer -->
                <tr>
                  <td
                    style="font-size:11px; text-align:center; padding-top:25px; color:#999999; border-top:1px solid rgba(0,217,255,0.2);">
                    - Team <a href="{{aboutusurl}}" style="text-decoration:none;color:#00d9ff;">
  Credenz'26
</a><br/>
                    PICT IEEE Student Branch
                  </td>
                </tr>

              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

</body>

</html>
